name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd ./blog-app
          npm install

      - name: Deploy
        run: |
          cd ./blog-app
          npm run deploy -- --base-href=/web-blog/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
