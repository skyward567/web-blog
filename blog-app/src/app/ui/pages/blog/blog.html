<div class="container">
  <div class="blog-layout">
    <!-- Боковая панель -->
    <aside class="admin-sidebar">
      <span class="admin-sidebar__title">Панель</span>

      <button
        class="admin-sidebar__btn admin-sidebar__btn--primary"
        title="Создать новую статью"
        (click)="onShowCreateForm()"
      >
        ✏️ Создать статью
      </button>

      <button
        class="admin-sidebar__btn"
        title="Показать статистику страницы"
        (click)="onShowStats()"
      >
        📊 Статистика
      </button>

      <p class="admin-sidebar__count">Статей: {{ postCount }}</p>
    </aside>

    <!-- Основной контент -->
    <div class="blog-content">
      <h1>Статьи</h1>

      <!-- Форма -->
      @if (showForm) {
        <app-article-form
          [editArticle]="editArticle"
          (save)="onSave($event)"
          (cancel)="onCancelForm()"
        >
        </app-article-form>
      }

      <!-- Пустое состояние -->
      @if (store.articles.length === 0) {
        <div class="blog-empty">
          <span class="blog-empty__icon">📄</span>
          <p class="blog-empty__title">Статей пока нет</p>
          <p class="blog-empty__text">Создайте первую статью с помощью кнопки в панели</p>
        </div>
      } @else {
        <!-- Список статей -->
        <div class="blog-grid">
          @for (article of store.articles; track article.id) {
            <app-article-card-blog
              [article]="article"
              (delete)="onDelete($event)"
              (edit)="onShowEditForm($event)"
            >
            </app-article-card-blog>
          }
        </div>

        <!-- Пагинация -->
        @if (totalPages > 1) {
          <div class="pagination">
            @for (page of pages; track page) {
              <button
                class="pagination__btn"
                [class.pagination__btn--active]="page === store.activePage"
                (click)="onPageChange(page)"
              >
                {{ page }}
              </button>
            }
          </div>
        }
      }
    </div>
  </div>
</div>
