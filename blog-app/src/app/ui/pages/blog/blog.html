<div class="container">
  <div class="blog-layout">
    <aside class="admin-sidebar">
      <span class="admin-sidebar__title">Панель</span>
      <button class="admin-sidebar__btn admin-sidebar__btn--primary" (click)="showForm = true">
        ✏️ Создать статью
      </button>
      <p class="admin-sidebar__count">Статей: {{ postCount }}</p>
    </aside>

    <div class="blog-content">
      <h1>Статьи</h1>

      <!-- Форма — показывается условно через @if -->
      @if (showForm) {
        <app-article-form (save)="onSave($event)" (cancel)="showForm = false"> </app-article-form>
      }

      <!-- Список статей через @for -->
      @if (articles.length === 0) {
        <div class="blog-empty">
          <span class="blog-empty__icon">📄</span>
          <p class="blog-empty__title">Статей пока нет</p>
          <p class="blog-empty__text">Создайте первую статью</p>
        </div>
      } @else {
        <div class="blog-grid">
          @for (article of articles; track article.id) {
            <app-article-card-blog [article]="article" (delete)="onDelete($event)">
            </app-article-card-blog>
          }
        </div>
      }
    </div>
  </div>
</div>
