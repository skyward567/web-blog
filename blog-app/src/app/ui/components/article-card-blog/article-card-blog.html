<div class="blog-card">
  <img
    class="blog-card__img"
    src="https://dac.digital/wp-content/uploads/2023/04/backend-java-optimized.png"
    alt="Статья"
  />
  <div class="blog-card__body">
    <h2 class="blog-card__title">{{ article.title }}</h2>
    <p class="blog-card__date">{{ article.date }}</p>
    <p class="blog-card__text">{{ article.text }}</p>
    <button class="blog-card__delete" (click)="onDelete()">✕</button>
  </div>
</div>
