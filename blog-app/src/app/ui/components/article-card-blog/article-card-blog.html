<div class="blog-card">
  <img
    class="blog-card__img"
    src="https://dac.digital/wp-content/uploads/2023/04/backend-java-optimized.png"
    alt="Статья"
  />
  <div class="blog-card__body">
    <h2 class="blog-card__title">{{ article.title }}</h2>
    <p class="blog-card__date">{{ article.date }}</p>
    <p class="blog-card__text">{{ article.text }}</p>
  </div>

  <!-- Кнопки появляются при наведении на карточку -->
  <div class="blog-card__actions">
    <button
      class="blog-card__action-btn blog-card__action-btn--edit"
      title="Редактировать статью"
      (click)="onEdit()"
    >
      ✏️
    </button>
    <button
      class="blog-card__action-btn blog-card__action-btn--delete"
      title="Удалить статью"
      (click)="onDelete()"
    >
      ✕
    </button>
  </div>
</div>
