<div class="create-article-form">
  <div>
    <label class="create-article-form__label">Заголовок *</label>
    <input
      class="create-article-form__input"
      [(ngModel)]="title"
      placeholder="Введите заголовок статьи"
    />
  </div>
  <div>
    <label class="create-article-form__label">Текст *</label>
    <textarea
      class="create-article-form__textarea"
      [(ngModel)]="text"
      rows="5"
      placeholder="Введите текст статьи"
    ></textarea>
  </div>
  <div class="create-article-form__buttons">
    <button class="btn btn--primary" (click)="onSave()">Сохранить</button>
    <button class="btn btn--secondary" (click)="onCancel()">Отмена</button>
  </div>
</div>
